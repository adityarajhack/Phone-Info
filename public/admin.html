<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - OSINT Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f13 0%, #1a1a24 100%);
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }

        .navbar {
            background: #1a1a24;
            padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 30px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a35;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            color: #ff6b6b;
            margin: 0;
            font-size: clamp(18px, 4vw, 22px);
        }

        .logout-btn {
            background: #ff5252;
            color: #fff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .logout-btn:active {
            transform: scale(0.95);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: clamp(20px, 4vw, 30px) clamp(15px, 4vw, 20px);
        }

        .login-box {
            max-width: 400px;
            margin: clamp(50px, 15vw, 100px) auto;
            background: #1a1a24;
            padding: clamp(30px, 6vw, 40px);
            border-radius: 12px;
            border: 1px solid #2a2a35;
        }

        .login-box h2 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: clamp(20px, 4vw, 30px);
            font-size: clamp(20px, 5vw, 24px);
        }

        .login-box input {
            width: 100%;
            padding: clamp(12px, 3vw, 15px);
            margin-bottom: clamp(15px, 3vw, 20px);
            background: #252532;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .login-box button {
            width: 100%;
            padding: clamp(12px, 3vw, 15px);
            background: #ff6b6b;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .login-box button:active {
            transform: scale(0.98);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: clamp(15px, 3vw, 20px);
            margin-bottom: clamp(20px, 4vw, 30px);
        }

        .stat-card {
            background: #1a1a24;
            padding: clamp(20px, 4vw, 25px);
            border-radius: 10px;
            text-align: center;
            border: 1px solid #2a2a35;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
        }

        .stat-card p {
            margin: 0;
            font-size: clamp(24px, 6vw, 32px);
            font-weight: bold;
            color: #fff;
        }

        .stat-card.pending p { color: #ffa500; }
        .stat-card.active p { color: #4caf50; }
        .stat-card.expired p { color: #ff5252; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: clamp(15px, 3vw, 20px);
            flex-wrap: wrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 5px;
        }

        .tab {
            padding: clamp(8px, 2vw, 10px) clamp(15px, 3vw, 20px);
            background: #1a1a24;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }

        .tab:active {
            transform: scale(0.95);
        }

        .tab.active {
            background: #ff6b6b;
            color: #fff;
            border-color: #ff6b6b;
        }

        .table-container {
            background: #1a1a24;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2a2a35;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: #252532;
            padding: clamp(12px, 2vw, 15px);
            text-align: left;
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
        }

        td {
            padding: clamp(12px, 2vw, 15px);
            border-top: 1px solid #2a2a35;
            font-size: 14px;
            word-break: break-word;
        }

        tr:hover {
            background: #252532;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.pending { background: #ffa500; color: #000; }
        .badge.active { background: #4caf50; color: #fff; }
        .badge.expired { background: #ff5252; color: #fff; }
        .badge.banned { background: #9e9e9e; color: #fff; }

        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .btn-renew { background: #00d4ff; color: #fff; }
        .btn-ban { background: #ff5252; color: #fff; }
        .btn-unban { background: #4caf50; color: #fff; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background: #1a1a24;
            padding: clamp(20px, 5vw, 30px);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #2a2a35;
        }

        .modal-content h3 {
            color: #ff6b6b;
            margin-top: 0;
            font-size: clamp(18px, 4vw, 22px);
            margin-bottom: 20px;
        }

        .modal-content label {
            display: block;
            margin: clamp(12px, 2vw, 15px) 0 5px;
            color: #888;
            font-size: 14px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: clamp(10px, 2vw, 12px);
            background: #252532;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }

        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: clamp(15px, 3vw, 20px);
        }

        .modal-buttons button {
            flex: 1;
            padding: clamp(10px, 2vw, 12px);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-buttons button:active {
            transform: scale(0.98);
        }

        .btn-save { background: #4caf50; color: #fff; }
        .btn-cancel { background: #555; color: #fff; }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .modal {
                align-items: flex-start;
                padding-top: 40px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .login-box input,
            .login-box button,
            .modal-content input,
            .modal-content select {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginSection" class="login-box">
        <h2>🛡️ Admin Login</h2>
        <input type="password" id="adminToken" placeholder="Enter Admin Token">
        <button onclick="adminLogin()">Login</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="hidden">
        <nav class="navbar">
            <h1>🛡️ Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </nav>

        <div class="container">
            <div class="stats-grid">
                <div class="stat-card pending"><h3>Pending</h3><p id="pendingCount">0</p></div>
                <div class="stat-card active"><h3>Active</h3><p id="activeCount">0</p></div>
                <div class="stat-card expired"><h3>Expired</h3><p id="expiredCount">0</p></div>
                <div class="stat-card"><h3>Banned</h3><p id="bannedCount">0</p></div>
                <div class="stat-card"><h3>Total Searches</h3><p id="totalSearches">0</p></div>
                <div class="stat-card"><h3>Logins (24h)</h3><p id="recentLogins">0</p></div>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('all')">All Users</div>
                <div class="tab" onclick="switchTab('pending')">Pending</div>
                <div class="tab" onclick="switchTab('active')">Active</div>
                <div class="tab" onclick="switchTab('expired')">Expired</div>
                <div class="tab" onclick="switchTab('banned')">Banned</div>
                <div class="tab" onclick="switchTab('logs')">Search Logs</div>
                <div class="tab" onclick="switchTab('login-logs')">Login History</div>
            </div>

            <div id="usersTable" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Searches</th>
                            <th>Expiry</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>

            <div id="logsTable" class="table-container hidden">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User</th>
                            <th>Phone</th>
                            <th>Results</th>
                            <th>IP</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Renew Modal -->
    <div id="renewModal" class="modal">
        <div class="modal-content">
            <h3>🔄 Renew User Access</h3>
            <input type="hidden" id="renewUserId">
            <label for="renewDuration">Duration</label>
            <select id="renewDuration">
                <option value="5min">5 Minutes</option>
                <option value="10min">10 Minutes</option>
                <option value="1hour">1 Hour</option>
                <option value="1day">1 Day</option>
                <option value="7days">7 Days</option>
                <option value="30days">30 Days</option>
                <option value="1month">1 Month</option>
                <option value="3months">3 Months</option>
                <option value="permanent">Permanent</option>
            </select>
            <label for="renewLimit">Search Limit</label>
            <input type="number" id="renewLimit" placeholder="Enter limit (-1 for unlimited)" value="10">
            <label for="renewPassword">New Password (Optional)</label>
            <input type="text" id="renewPassword" placeholder="Leave blank to keep old password">
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveRenewal()">Save</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let adminToken = localStorage.getItem('admin_token');
        if (adminToken) showDashboard();

        async function adminLogin() {
            const token = document.getElementById('adminToken').value;
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'x-admin-token': token }
                });
                if (res.ok) {
                    adminToken = token;
                    localStorage.setItem('admin_token', token);
                    showDashboard();
                } else {
                    alert('Invalid admin token');
                }
            } catch (err) {
                alert('Login failed');
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadStats();
            loadUsers('all');
        }

        function logout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }

        async function loadStats() {
            const res = await fetch('/api/admin/stats', {
                headers: { 'x-admin-token': adminToken }
            });
            const stats = await res.json();
            document.getElementById('pendingCount').innerText = stats.pending;
            document.getElementById('activeCount').innerText = stats.active;
            document.getElementById('expiredCount').innerText = stats.expired;
            document.getElementById('bannedCount').innerText = stats.banned;
            document.getElementById('totalSearches').innerText = stats.totalSearches;
            document.getElementById('recentLogins').innerText = stats.recentLogins;
        }

        async function loadUsers(status) {
            const res = await fetch(`/api/admin/users?status=${status}`, {
                headers: { 'x-admin-token': adminToken }
            });
            const users = await res.json();
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td>${u.mobile}</td>
                    <td>${u.email}</td>
                    <td><span class="badge ${u.status}">${u.status}</span></td>
                    <td>${u.searches_used} / ${u.search_limit === -1 ? '∞' : u.search_limit}</td>
                    <td>${u.expiry_date === 'permanent' ? 'Never' : new Date(u.expiry_date).toLocaleDateString()}</td>
                    <td>
                        <button class="action-btn btn-renew" onclick="openRenew(${u.id})">Renew</button>
                        ${u.status === 'banned' ? 
                            `<button class="action-btn btn-unban" onclick="unbanUser(${u.id})">Unban</button>` :
                            `<button class="action-btn btn-ban" onclick="banUser(${u.id})">Ban</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function loadLogs(type) {
            const res = await fetch(`/api/admin/logs?type=${type}`, {
                headers: { 'x-admin-token': adminToken }
            });
            const logs = await res.json();
            const tbody = document.getElementById('logsBody');
            
            if (type === 'search') {
                tbody.innerHTML = logs.map(l => `
                    <tr>
                        <td>${l.id}</td>
                        <td>${l.name || 'Unknown'}</td>
                        <td>${l.phone}</td>
                        <td>${l.results_count}</td>
                        <td>${l.ip_address}</td>
                        <td>${new Date(l.created_at).toLocaleString()}</td>
                    </tr>
                `).join('');
            } else if (type === 'login') {
                tbody.innerHTML = logs.map(l => `
                    <tr>
                        <td>${l.id}</td>
                        <td>${l.name || 'Unknown'}</td>
                        <td>${l.success ? '✅' : '❌'}</td>
                        <td>${l.ip_address}</td>
                        <td>${l.device_fingerprint?.substring(0, 10)}...</td>
                        <td>${new Date(l.created_at).toLocaleString()}</td>
                    </tr>
                `).join('');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'logs') {
                document.getElementById('usersTable').classList.add('hidden');
                document.getElementById('logsTable').classList.remove('hidden');
                loadLogs('search');
            } else if (tab === 'login-logs') {
                document.getElementById('usersTable').classList.add('hidden');
                document.getElementById('logsTable').classList.remove('hidden');
                loadLogs('login');
            } else {
                document.getElementById('usersTable').classList.remove('hidden');
                document.getElementById('logsTable').classList.add('hidden');
                loadUsers(tab);
            }
        }

        function openRenew(userId) {
            document.getElementById('renewUserId').value = userId;
            document.getElementById('renewModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('renewModal').style.display = 'none';
        }

        async function saveRenewal() {
            const userId = document.getElementById('renewUserId').value;
            const duration = document.getElementById('renewDuration').value;
            const searchLimit = parseInt(document.getElementById('renewLimit').value);
            const newPassword = document.getElementById('renewPassword').value;

            await fetch('/api/admin/renew', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify({ userId, duration, searchLimit, newPassword: newPassword || null })
            });

            closeModal();
            loadStats();
            loadUsers('all');
            alert('User renewed successfully!');
        }

        async function banUser(userId) {
            if (!confirm('Ban this user?')) return;
            await fetch('/api/admin/renew', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify({ userId, status: 'banned' })
            });
            loadStats();
            loadUsers('all');
        }

        async function unbanUser(userId) {
            if (!confirm('Unban this user?')) return;
            await fetch('/api/admin/renew', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify({ userId, status: 'active' })
            });
            loadStats();
            loadUsers('all');
        }

        // Close modal on outside click
        document.getElementById('renewModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
